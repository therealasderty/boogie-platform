[build]
  # Specifichiamo che il sito da buildare è nella cartella website
  base = "website"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Usciamo da website per trovare le funzioni comuni
  directory = "../netlify/functions"

[dev]
  # Next.js di solito usa la porta 3000
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Mantieni le tue funzioni programmate così come sono
[functions.compleanno-premio]
  schedule = "0 8 * * *"

[functions.pulizia-chiusure]
  schedule = "0 3 * * 1"

[functions.statistiche-settimanali]
  schedule = "0 23 * * 0"

[functions.pubblica-social-schedulato]
  schedule = "0 2,6,10,14,18,22 * * *"

[functions.pulizia-social-posts]
  schedule = "0 4 1 * *"

[functions."pubblica-social"]
  timeout = 26

