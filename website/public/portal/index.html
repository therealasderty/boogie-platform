<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>WiFi Boogie Bistrot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card" id="card">

    <!-- Header sempre visibile -->
    <div class="header">
      <div class="logo">
        <img src="../Logo-Gold.svg" alt="Boogie Bistrot" />
      </div>
      <h1>WiFi Boogie Bistrot</h1>
    </div>

    <!-- Spinner iniziale -->
    <div id="state-loading" class="spinner-wrap">
      <div class="spinner"></div>
      <p>Connessione in corso…</p>
    </div>

    <!-- Stato: nuovo utente → form -->
    <div id="state-new" style="display:none">
      <p style="font-size:0.875rem; color:var(--text2); text-align:center; margin-bottom:1rem;">
        Inserisci i tuoi dati per connetterti gratuitamente.
      </p>
      <form class="form" id="form-new" novalidate>

        <div class="field">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" name="nome" placeholder="Il tuo nome" autocomplete="given-name" required />
        </div>

        <div class="field">
          <label for="cognome">Cognome *</label>
          <input type="text" id="cognome" name="cognome" placeholder="Il tuo cognome" autocomplete="family-name" required />
        </div>

        <div class="field">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" placeholder="tua@email.it" autocomplete="email" inputmode="email" required />
        </div>

        <div class="field">
          <label for="compleanno">Data di nascita</label>
          <input type="date" id="compleanno" name="compleanno" autocomplete="bday" />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="consenso" name="consenso" />
          <span>
            Acconsento a ricevere comunicazioni promozionali da Boogie Bistrot
            (aggiornamenti eventi, offerte). Puoi disiscriverti in qualsiasi momento.
            <a href="https://boogiebistrot.com/privacy" target="_blank" rel="noopener">Privacy policy</a>
          </span>
        </label>

        <div id="msg-new" class="msg"></div>

        <button type="submit" class="btn-connect" id="btn-new">
          Connettiti gratis
        </button>
      </form>
    </div>

    <!-- Stato: utente di ritorno -->
    <div id="state-returning" style="display:none">
      <div class="welcome">
        <span class="hello">Bentornato,</span>
        <span class="name" id="welcome-name">—</span>
        <span class="visits" id="welcome-visits"></span>
      </div>

      <div id="msg-ret" class="msg" style="margin-top:1rem;"></div>

      <button class="btn-connect" id="btn-returning" style="margin-top:1.25rem;">
        Connettiti
      </button>
    </div>

    <!-- Stato: connesso con successo -->
    <div id="state-success" style="display:none; text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">🎉</div>
      <p style="font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:0.5rem;">
        Benvenuto, <span id="success-name"></span>!
      </p>
      <p style="font-size:0.875rem; color:var(--text2); margin-bottom:1.5rem;">
        Sei connesso a WiFi Boogie Bistrot. Buona navigazione!
      </p>
      <a href="https://boogiebistrot.it" class="btn-connect" style="display:block; text-decoration:none; text-align:center;">
        Vai al sito Boogie Bistrot
      </a>
    </div>

    <!-- Note legali -->
    <p class="footer-note">
      Connettendoti accetti i <a href="https://boogiebistrot.com/privacy" style="color:var(--accent);" target="_blank" rel="noopener">termini d'uso</a> della rete WiFi.
    </p>

  </div>

  <script>
    (function () {
      'use strict';

      // Leggi clientMac dall'URL se presente (Omada potrebbe passarlo anche in No Auth mode)
      const qs = new URLSearchParams(window.location.search);
      const clientMac = qs.get('clientMac') || '';

      // ── Helper: mostra stato ────────────────────────────────────────
      function showState(id) {
        ['state-loading','state-new','state-returning','state-success'].forEach(s => {
          document.getElementById(s).style.display = (s === id) ? '' : 'none';
        });
      }

      function showMsg(elId, text, type) {
        const el = document.getElementById(elId);
        el.textContent = text;
        el.className = 'msg ' + type + ' show';
      }

      function clearMsg(elId) {
        const el = document.getElementById(elId);
        el.textContent = '';
        el.className = 'msg';
      }

      function showSuccess(name) {
        document.getElementById('success-name').textContent = name || 'ospite';
        showState('state-success');
      }

      // ── Salva su Netlify e mostra successo ──────────────────────────
      function submitToNetlify(payload, msgElId, btnEl) {
        return fetch('/.netlify/functions/portal-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ ...payload, clientMac }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.success) {
              showSuccess(data.name || payload.nome || '');
            } else {
              if (btnEl) { btnEl.disabled = false; btnEl.textContent = btnEl._origText; }
              showMsg(msgElId, data.error || 'Errore. Riprova.', 'error');
            }
          })
          .catch(() => {
            if (btnEl) { btnEl.disabled = false; btnEl.textContent = btnEl._origText; }
            showMsg(msgElId, 'Errore di rete. Riprova.', 'error');
          });
      }

      // ── 1. Controlla se cliente noto (cookie) ───────────────────────
      const checkController = new AbortController();
      const checkTimeout = setTimeout(() => checkController.abort(), 5000);

      fetch('/.netlify/functions/portal-check', {
        credentials: 'include',
        signal: checkController.signal,
      })
        .then(r => r.json())
        .then(data => {
          clearTimeout(checkTimeout);
          if (data.returning) {
            document.getElementById('welcome-name').textContent = data.name || 'amico';
            if (data.visits && data.visits > 1) {
              document.getElementById('welcome-visits').textContent =
                'Visita n. ' + data.visits + ' — grazie per essere tornato!';
            }
            showState('state-returning');
          } else {
            showState('state-new');
          }
        })
        .catch(() => {
          clearTimeout(checkTimeout);
          showState('state-new');
        });

      // ── 2. Submit nuovo utente ──────────────────────────────────────
      document.getElementById('form-new').addEventListener('submit', function (e) {
        e.preventDefault();
        clearMsg('msg-new');

        const nome       = document.getElementById('nome').value.trim();
        const cognome    = document.getElementById('cognome').value.trim();
        const email      = document.getElementById('email').value.trim().toLowerCase();
        const compleanno = document.getElementById('compleanno').value || '';
        const consenso   = document.getElementById('consenso').checked;

        if (!nome)    { showMsg('msg-new', 'Inserisci il tuo nome.', 'error'); return; }
        if (!cognome) { showMsg('msg-new', 'Inserisci il tuo cognome.', 'error'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showMsg('msg-new', 'Inserisci un indirizzo email valido.', 'error');
          return;
        }

        const btn = document.getElementById('btn-new');
        btn._origText = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Salvataggio…';

        submitToNetlify({ nome, cognome, email, compleanno, consenso }, 'msg-new', btn);
      });

      // ── 3. Submit utente di ritorno ─────────────────────────────────
      document.getElementById('btn-returning').addEventListener('click', function () {
        clearMsg('msg-ret');
        this._origText = this.textContent;
        this.disabled = true;
        this.textContent = 'Connessione…';

        submitToNetlify({ returning: true }, 'msg-ret', this);
      });

    })();
  </script>

</body>
</html>
