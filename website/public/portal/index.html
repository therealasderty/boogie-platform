<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>WiFi Boogie Bistrot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card" id="card">

    <!-- Header sempre visibile -->
    <div class="header">
      <div class="logo">
        <img src="../Logo-Gold.svg" alt="Boogie Bistrot" />
      </div>
      <h1>WiFi Boogie Bistrot</h1>
    </div>

    <!-- Spinner iniziale (mostrato finché /api/portal-check non risponde) -->
    <div id="state-loading" class="spinner-wrap">
      <div class="spinner"></div>
      <p>Connessione in corso…</p>
    </div>

    <!-- Stato: nuovo utente → form -->
    <div id="state-new" style="display:none">
      <p style="font-size:0.875rem; color:var(--text2); text-align:center; margin-bottom:1rem;">
        Inserisci i tuoi dati per connetterti gratuitamente.
      </p>
      <form class="form" id="form-new" novalidate>

        <!-- Hidden fields Omada (Gateway mode: clientMac, gatewayMac, vid, t, site, redirectUrl) -->
        <input type="hidden" id="h-clientMac"   name="clientMac" />
        <input type="hidden" id="h-gatewayMac"  name="gatewayMac" />
        <input type="hidden" id="h-vid"         name="vid" />
        <input type="hidden" id="h-t"           name="t" />
        <input type="hidden" id="h-site"        name="site" />
        <input type="hidden" id="h-redirectUrl" name="redirectUrl" />

        <div class="field">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" name="nome" placeholder="Il tuo nome" autocomplete="given-name" required />
        </div>

        <div class="field">
          <label for="cognome">Cognome *</label>
          <input type="text" id="cognome" name="cognome" placeholder="Il tuo cognome" autocomplete="family-name" required />
        </div>

        <div class="field">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" placeholder="tua@email.it" autocomplete="email" inputmode="email" required />
        </div>

        <div class="field">
          <label for="compleanno">Data di nascita</label>
          <input type="date" id="compleanno" name="compleanno" autocomplete="bday" />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="consenso" name="consenso" />
          <span>
            Acconsento a ricevere comunicazioni promozionali da Boogie Bistrot
            (aggiornamenti eventi, offerte). Puoi disiscriverti in qualsiasi momento.
            <a href="https://boogiebistrot.com/privacy" target="_blank" rel="noopener">Privacy policy</a>
          </span>
        </label>

        <div id="msg-new" class="msg"></div>

        <button type="submit" class="btn-connect" id="btn-new">
          Connettiti gratis
        </button>
      </form>
    </div>

    <!-- Stato: utente di ritorno -->
    <div id="state-returning" style="display:none">
      <!-- Hidden fields Omada (duplicati per il form di ritorno) -->
      <input type="hidden" id="r-clientMac"   value="" />
      <input type="hidden" id="r-gatewayMac"  value="" />
      <input type="hidden" id="r-vid"         value="" />
      <input type="hidden" id="r-t"           value="" />
      <input type="hidden" id="r-site"        value="" />
      <input type="hidden" id="r-redirectUrl" value="" />

      <div class="welcome">
        <span class="hello">Bentornato,</span>
        <span class="name" id="welcome-name">—</span>
        <span class="visits" id="welcome-visits"></span>
      </div>

      <div id="msg-ret" class="msg" style="margin-top:1rem;"></div>

      <button class="btn-connect" id="btn-returning" style="margin-top:1.25rem;">
        Connettiti
      </button>
    </div>

    <!-- Note legali -->
    <p class="footer-note">
      Connettendoti accetti i <a href="https://boogiebistrot.com/privacy" style="color:var(--accent);" target="_blank" rel="noopener">termini d'uso</a> della rete WiFi.
    </p>

  </div>

  <script>
    (function () {
      'use strict';

      // ── Lettura parametri Omada da querystring ──────────────────────
      // SSID "Boogie Clienti" è di tipo Gateway (ER706W), quindi i parametri sono:
      // clientMac, gatewayMac, vid, t, site, redirectUrl
      // (NON apMac/ssidName/radioId che arrivano solo da SSID di tipo EAP)
      const qs = new URLSearchParams(window.location.search);
      const omada = {
        clientMac:   qs.get('clientMac')   || '',
        gatewayMac:  qs.get('gatewayMac')  || '',
        vid:         qs.get('vid')         || '',
        t:           qs.get('t')           || '',
        site:        qs.get('site')        || '',
        redirectUrl: qs.get('redirectUrl') || 'https://boogiebistrot.it',
      };

      // ── Popola hidden fields ────────────────────────────────────────
      ['clientMac','gatewayMac','vid','t','site','redirectUrl'].forEach(k => {
        const n = document.getElementById('h-' + k);
        const r = document.getElementById('r-' + k);
        if (n) n.value = omada[k];
        if (r) r.value = omada[k];
      });

      // ── Helper: mostra stato ────────────────────────────────────────
      function showState(id) {
        ['state-loading','state-new','state-returning'].forEach(s => {
          document.getElementById(s).style.display = (s === id) ? '' : 'none';
        });
      }

      function showMsg(elId, text, type) {
        const el = document.getElementById(elId);
        el.textContent = text;
        el.className = 'msg ' + type + ' show';
      }

      function clearMsg(elId) {
        const el = document.getElementById(elId);
        el.textContent = '';
        el.className = 'msg';
      }

      // ── Redirect post-autorizzazione ────────────────────────────────
      function redirect(url) {
        window.location.href = url || omada.redirectUrl || 'https://boogiebistrot.it';
      }

      // ── Autorizza MAC sul controller OC200 locale (navigazione browser) ──
      // XHR da HTTPS a HTTP è blocked (mixed content).
      // window.location.href da HTTPS a HTTP è PERMESSO — il browser naviga
      // direttamente all'endpoint auth dell'OC200, che autorizza il MAC
      // e redirige alla landing page automaticamente.
      function omadaAuth(landingUrl) {
        var params = new URLSearchParams();
        params.set('clientMac',  omada.clientMac);
        params.set('gatewayMac', omada.gatewayMac);
        params.set('vid',        omada.vid  || '');
        params.set('site',       omada.site || '');
        params.set('time',       String(8 * 60 * 60 * 1000));
        params.set('authType',   '4');
        params.set('redirectUrl', landingUrl || omada.redirectUrl || 'https://boogiebistrot.it');
        window.location.href = 'http://192.168.10.1:8088/portal/auth?' + params.toString();
      }

      // ── 1. Controlla se cliente noto (cookie) ───────────────────────
      const checkController = new AbortController();
      const checkTimeout = setTimeout(() => checkController.abort(), 5000);

      fetch('/.netlify/functions/portal-check', {
        credentials: 'include',
        signal: checkController.signal,
      })
        .then(r => r.json())
        .then(data => {
          clearTimeout(checkTimeout);
          if (data.returning) {
            document.getElementById('welcome-name').textContent = data.name || 'amico';
            if (data.visits && data.visits > 1) {
              document.getElementById('welcome-visits').textContent =
                'Visita n. ' + data.visits + ' — grazie per essere tornato!';
            }
            showState('state-returning');
          } else {
            showState('state-new');
          }
        })
        .catch(() => {
          clearTimeout(checkTimeout);
          showState('state-new');
        });

      // ── 2. Submit nuovo utente ──────────────────────────────────────
      // FLUSSO: valida → naviga a OC200 locale (auth) → OC200 redirige a /portal/success/
      // La success page ha già internet e salva i dati su Airtable/Brevo.
      document.getElementById('form-new').addEventListener('submit', function (e) {
        e.preventDefault();
        clearMsg('msg-new');

        const nome       = document.getElementById('nome').value.trim();
        const cognome    = document.getElementById('cognome').value.trim();
        const email      = document.getElementById('email').value.trim().toLowerCase();
        const compleanno = document.getElementById('compleanno').value || '';
        const consenso   = document.getElementById('consenso').checked;

        if (!nome)    { showMsg('msg-new', 'Inserisci il tuo nome.', 'error'); return; }
        if (!cognome) { showMsg('msg-new', 'Inserisci il tuo cognome.', 'error'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showMsg('msg-new', 'Inserisci un indirizzo email valido.', 'error');
          return;
        }

        const btn = document.getElementById('btn-new');
        btn.disabled = true;
        btn.textContent = 'Connessione…';

        // Costruisci la success URL con i dati del form come parametri
        const successUrl = new URL('https://boogiebistrot.com/portal/success/');
        successUrl.searchParams.set('nome',       nome);
        successUrl.searchParams.set('cognome',    cognome);
        successUrl.searchParams.set('email',      email);
        successUrl.searchParams.set('compleanno', compleanno);
        successUrl.searchParams.set('consenso',   consenso ? '1' : '0');
        successUrl.searchParams.set('clientMac',  omada.clientMac);
        successUrl.searchParams.set('gatewayMac', omada.gatewayMac);
        successUrl.searchParams.set('vid',        omada.vid  || '');
        successUrl.searchParams.set('site',       omada.site || '');

        omadaAuth(successUrl.toString());
      });

      // ── 3. Submit utente di ritorno ─────────────────────────────────
      document.getElementById('btn-returning').addEventListener('click', function () {
        clearMsg('msg-ret');
        this.disabled = true;
        this.textContent = 'Connessione…';

        const successUrl = new URL('https://boogiebistrot.com/portal/success/');
        successUrl.searchParams.set('returning',  '1');
        successUrl.searchParams.set('clientMac',  document.getElementById('r-clientMac').value);
        successUrl.searchParams.set('gatewayMac', document.getElementById('r-gatewayMac').value);
        successUrl.searchParams.set('vid',        document.getElementById('r-vid').value  || '');
        successUrl.searchParams.set('site',       document.getElementById('r-site').value || '');

        omadaAuth(successUrl.toString());
      });

    })();
  </script>

</body>
</html>
